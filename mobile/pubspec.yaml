name: nuvelo_marketplace
description: Nuvelo — Nice Vibes Only. Classifieds for Hungary.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.1.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.6
  http: ^1.2.1
  google_fonts: ^6.2.1
  intl: any
  supabase_flutter: ^2.0.0
  flutter_dotenv: ^5.0.0
  go_router: ^13.0.0
  cached_network_image: ^3.3.0
  image_picker: ^1.0.0
  shared_preferences: ^2.2.0
  flutter_svg: ^2.0.0
  timeago: ^3.6.0
  url_launcher: ^6.2.0
  share_plus: ^10.0.0
  shimmer: ^3.0.0
  fl_chart: ^0.69.0
  collection: ^1.18.0
  provider: ^6.1.2
  flutter_local_notifications: ^18.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.4

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/env
    - assets/images/

flutter_launcher_icons:
  ios: true
  android: false
  image_path: "assets/images/nuvelo_icon.png"
  remove_alpha_ios: true
  background_color: "#0D0A1E"

flutter_native_splash:
  color: "#0D0A1E"
  image: assets/images/nuvelo_logo.png
  ios: true
  android: false
  web: false

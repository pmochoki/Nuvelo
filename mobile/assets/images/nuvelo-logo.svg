<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 220" width="500" height="220">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D0A1E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#13102A;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="symbolGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#A78BFA;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:0" />
    </linearGradient>
    <clipPath id="circleClip">
      <circle cx="90" cy="105" r="62"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="500" height="220" rx="20" fill="url(#bgGrad)"/>

  <!-- Subtle background glow behind symbol -->
  <circle cx="90" cy="105" r="75" fill="url(#glowGrad)"/>

  <!-- Outer orbit ring -->
  <circle cx="90" cy="105" r="60" fill="none" stroke="#7C3AED" stroke-width="1.5" stroke-opacity="0.4"/>

  <!-- Inner orbit ring -->
  <circle cx="90" cy="105" r="42" fill="none" stroke="#8B5CF6" stroke-width="1" stroke-opacity="0.3"/>

  <!-- Main circle fill -->
  <circle cx="90" cy="105" r="52" fill="#7C3AED" fill-opacity="0.15"/>

  <!-- Crescent moon shape — large white circle -->
  <circle cx="90" cy="105" r="38" fill="none" stroke="url(#symbolGrad)" stroke-width="0"/>

  <!-- Crescent: outer arc -->
  <path d="M 62 80 
           A 38 38 0 1 1 62 130 
           A 28 28 0 1 0 62 80 Z" 
       fill="url(#symbolGrad)"/>

  <!-- Inner swoosh line 1 -->
  <path d="M 78 72 Q 120 95 108 130" 
        fill="none" 
        stroke="white" 
        stroke-width="2.5" 
        stroke-linecap="round"
        stroke-opacity="0.9"/>

  <!-- Inner swoosh line 2 -->
  <path d="M 68 82 Q 115 105 100 138" 
        fill="none" 
        stroke="white" 
        stroke-width="1.5" 
        stroke-linecap="round"
        stroke-opacity="0.5"/>

  <!-- Orbit dot -->
  <circle cx="128" cy="78" r="5" fill="#A78BFA"/>
  <circle cx="128" cy="78" r="3" fill="white"/>

  <!-- NUVELO text -->
  <text x="170" 
        y="95" 
        font-family="Georgia, 'Times New Roman', serif" 
        font-size="58" 
        font-weight="900"
        letter-spacing="4"
       fill="white">NUVELO</text>

  <!-- Divider line -->
  <line x1="170" y1="108" x2="460" y2="108" stroke="#7C3AED" stroke-width="1" stroke-opacity="0.5"/>

  <!-- Nice Vibes Only tagline -->
  <text x="170" 
        y="130" 
        font-family="Georgia, 'Times New Roman', serif" 
        font-size="14" 
        font-weight="400"
        letter-spacing="5"
        fill="#A78BFA"
        fill-opacity="0.85">NICE VIBES ONLY</text>

</svg>
